image: node:22

stages:
  - build
  - deploy

build:
  stage: build
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip ci\]/'
      when: never
    - if: '$CI_COMMIT_BRANCH'
  before_script:
    - apt-get update -qq && apt-get install -y -qq ruby-full build-essential
    - gem install bundler
    - bundle install
    - npm ci
  script:
    - npx --version
    - npx antora --extension @antora/pdf-extension antora-playbook.yml
    - |
      PDF_FILE=$(find build/assembler -name '*.pdf' -type f -size +0 2>/dev/null | head -1)
      if [ -z "$PDF_FILE" ]; then
        PDF_FILE=$(find build/site -path '*/_exports/*.pdf' -type f -size +0 2>/dev/null | head -1)
      fi
      if [ -n "$PDF_FILE" ]; then
        mkdir -p modules/appendix/attachments
        cp "$PDF_FILE" "modules/appendix/attachments/${CI_PROJECT_NAME}.pdf"
        echo "PDF generated: modules/appendix/attachments/${CI_PROJECT_NAME}.pdf"
      else
        echo "Warning: No PDF was generated by the Antora PDF extension"
      fi
    - npm run build
  artifacts:
    paths:
      - build/site
      - modules/appendix/attachments/

pages:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip ci\]/'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  dependencies:
    - build
  script:
    - mv build/site public
  artifacts:
    paths:
      - public
